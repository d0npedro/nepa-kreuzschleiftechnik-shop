<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEPA Kreuzschleiftechnik – Shop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #001a4d;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo-text {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }
    .logo-text span { color: #00A651; }
    .subtitle {
      font-size: clamp(0.875rem, 2.5vw, 1.25rem);
      color: rgba(255,255,255,0.7);
      margin-bottom: 3rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    h1 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 600;
      margin-bottom: 1rem;
      color: #ffffff;
    }
    p {
      font-size: clamp(1rem, 2.5vw, 1.125rem);
      color: rgba(255,255,255,0.6);
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 3rem;
    }
    .loader {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      justify-content: center;
    }
    .loader span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00A651;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .loader span:nth-child(2) { animation-delay: 0.2s; }
    .loader span:nth-child(3) { animation-delay: 0.4s; }
    .loader span:nth-child(4) { animation-delay: 0.6s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
    .bar {
      margin-top: 2rem;
      width: min(320px, 80vw);
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-inner {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #003087, #00A651);
      border-radius: 2px;
      animation: slide 2s ease-in-out infinite;
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="logo-text">NEPA<span>.</span></div>
  <div class="subtitle">Kreuzschleiftechnik</div>
  <h1>Shop wird aufgebaut...</h1>
  <p>Unser neuer Online-Shop für Hon-Ersatzteile und Schleiftechnik-Zubehör ist in Vorbereitung.</p>
  <div class="loader">
    <span></span><span></span><span></span><span></span>
  </div>
  <div class="bar"><div class="bar-inner"></div></div>
  <footer>&copy; 2026 NEPA Kreuzschleiftechnik</footer>
</body>
</html>
